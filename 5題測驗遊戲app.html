<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>健康小達人｜5題測驗遊戲</title>
  <style>
    :root{
      --bg1:#e9f7ff;
      --bg2:#fff4dd;
      --main:#2f80ed;
      --main-dark:#1d63b7;
      --good:#20b26b;
      --bad:#ef5350;
      --text:#243447;
      --muted:#6b7a90;
      --card:#ffffff;
      --yellow:#ffc94a;
      --shadow:0 18px 45px rgba(28,60,100,.18);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(47,128,237,.18), transparent 28%),
        radial-gradient(circle at 85% 20%, rgba(255,201,74,.25), transparent 32%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .app{
      width:min(980px,100%);
      min-height:640px;
      background:rgba(255,255,255,.78);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:30px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:18px 24px;
      background:rgba(255,255,255,.55);
      border-bottom:1px solid rgba(47,128,237,.12);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:900;
      letter-spacing:.5px;
    }

    .logo{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      border-radius:14px;
      background:linear-gradient(135deg,var(--main),#65c7ff);
      color:#fff;
      font-size:24px;
      box-shadow:0 8px 18px rgba(47,128,237,.25);
    }

    .score-pill{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:#fff;
      color:var(--main-dark);
      font-weight:800;
      box-shadow:0 8px 20px rgba(30,80,140,.08);
      white-space:nowrap;
    }

    .screen{
      display:none;
      padding:38px 28px 34px;
      min-height:560px;
    }

    .screen.active{
      display:block;
      animation:fade .25s ease;
    }

    @keyframes fade{
      from{opacity:0; transform:translateY(8px);}
      to{opacity:1; transform:translateY(0);}
    }

    .hero{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:26px;
      align-items:center;
      min-height:500px;
    }

    .hero h1{
      font-size:clamp(34px,5vw,62px);
      line-height:1.08;
      margin:0 0 18px;
      color:#17324d;
    }

    .hero p{
      font-size:20px;
      line-height:1.7;
      color:var(--muted);
      margin:0 0 28px;
    }

    .hero-card{
      background:#fff;
      border-radius:28px;
      padding:26px;
      box-shadow:0 14px 36px rgba(34,70,110,.13);
      position:relative;
      overflow:hidden;
    }

    .hero-card::before{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      background:rgba(255,201,74,.28);
      border-radius:50%;
      right:-60px;
      top:-70px;
    }

    .mascot{
      font-size:120px;
      text-align:center;
      margin:14px 0;
      filter:drop-shadow(0 12px 18px rgba(0,0,0,.08));
    }

    .rules{
      display:grid;
      gap:12px;
      position:relative;
      z-index:1;
    }

    .rule{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 14px;
      border-radius:16px;
      background:#f5f9ff;
      color:#36506d;
      font-weight:700;
    }

    .btn{
      border:0;
      cursor:pointer;
      border-radius:18px;
      padding:15px 22px;
      font-size:18px;
      font-weight:900;
      font-family:inherit;
      transition:.18s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--main),#5fc2ff);
      color:#fff;
      box-shadow:0 12px 22px rgba(47,128,237,.25);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 28px rgba(47,128,237,.32);
    }

    .btn-light{
      background:#fff;
      color:var(--main-dark);
      border:2px solid rgba(47,128,237,.14);
    }

    .quiz-wrap{
      max-width:820px;
      margin:0 auto;
    }

    .hud{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:14px;
      align-items:center;
      margin-bottom:22px;
    }

    .progress-box{
      background:#fff;
      border-radius:999px;
      padding:7px;
      box-shadow:0 8px 18px rgba(30,70,110,.08);
    }

    .progress{
      height:15px;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--main),#65d6ff);
      transition:width .25s ease;
    }

    .timer{
      width:74px;
      height:74px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:#fff;
      border:7px solid var(--yellow);
      font-size:24px;
      font-weight:1000;
      box-shadow:0 8px 20px rgba(30,70,110,.08);
    }

    .question-card{
      background:#fff;
      border-radius:30px;
      padding:28px;
      box-shadow:0 16px 40px rgba(34,70,110,.13);
    }

    .q-meta{
      color:var(--main-dark);
      font-size:17px;
      font-weight:900;
      margin-bottom:12px;
    }

    .question{
      font-size:clamp(24px,3vw,34px);
      line-height:1.35;
      font-weight:1000;
      margin-bottom:24px;
    }

    .choices{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .choice{
      width:100%;
      min-height:86px;
      border:3px solid transparent;
      border-radius:22px;
      padding:16px 18px;
      background:#f6f9ff;
      text-align:left;
      font-size:20px;
      font-weight:900;
      color:#2d435c;
      cursor:pointer;
      font-family:inherit;
      transition:.15s ease;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .choice:hover:not(:disabled){
      transform:translateY(-2px);
      border-color:rgba(47,128,237,.35);
      background:#eef6ff;
    }

    .choice:disabled{
      cursor:not-allowed;
      opacity:.95;
    }

    .choice .letter{
      width:36px;
      height:36px;
      border-radius:12px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      background:#fff;
      color:var(--main-dark);
      box-shadow:inset 0 0 0 2px rgba(47,128,237,.12);
    }

    .choice.correct{
      background:#e7fff2;
      border-color:var(--good);
      color:#116d43;
    }

    .choice.wrong{
      background:#fff0f0;
      border-color:var(--bad);
      color:#a92d2b;
    }

    .feedback{
      margin-top:20px;
      padding:18px;
      border-radius:20px;
      font-size:18px;
      line-height:1.65;
      font-weight:700;
      background:#fff9e8;
      border:2px solid rgba(255,201,74,.45);
      display:none;
    }

    .feedback.show{
      display:block;
      animation:fade .2s ease;
    }

    .next-row{
      display:flex;
      justify-content:flex-end;
      margin-top:18px;
    }

    .result{
      max-width:760px;
      margin:0 auto;
      text-align:center;
      background:#fff;
      border-radius:32px;
      padding:34px 28px;
      box-shadow:0 16px 40px rgba(34,70,110,.13);
    }

    .result-emoji{
      font-size:96px;
      margin-bottom:8px;
    }

    .result h2{
      font-size:42px;
      margin:6px 0 12px;
      color:#17324d;
    }

    .stars{
      font-size:46px;
      letter-spacing:4px;
      margin:10px 0 18px;
    }

    .final-score{
      font-size:26px;
      font-weight:1000;
      color:var(--main-dark);
      margin-bottom:12px;
    }

    .review{
      margin-top:22px;
      display:grid;
      gap:10px;
      text-align:left;
    }

    .review-item{
      padding:14px 16px;
      border-radius:16px;
      background:#f7f9fc;
      font-weight:700;
      line-height:1.5;
    }

    .review-item.good{ border-left:8px solid var(--good); }
    .review-item.bad{ border-left:8px solid var(--bad); }

    .actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .confetti{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .confetti span{
      position:absolute;
      width:10px;
      height:16px;
      top:-20px;
      opacity:.9;
      animation:fall 1.8s linear forwards;
    }

    @keyframes fall{
      to{
        transform:translateY(760px) rotate(540deg);
        opacity:0;
      }
    }

    @media (max-width:760px){
      .app{ min-height:auto; border-radius:22px; }
      .topbar{ padding:14px 16px; }
      .screen{ padding:26px 16px; min-height:auto; }
      .hero{ grid-template-columns:1fr; min-height:auto; }
      .hero p{ font-size:17px; }
      .mascot{ font-size:88px; }
      .hud{ grid-template-columns:1fr auto; }
      .hud .score-pill{ grid-column:1 / -1; justify-content:center; }
      .choices{ grid-template-columns:1fr; }
      .choice{ min-height:70px; font-size:18px; }
      .timer{ width:62px; height:62px; font-size:21px; border-width:6px; }
      .result h2{ font-size:34px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="confetti" id="confetti"></div>

    <header class="topbar">
      <div class="brand">
        <div class="logo">✓</div>
        <div>健康小達人｜5題測驗</div>
      </div>
      <div class="score-pill">目前分數：<span id="topScore">0</span></div>
    </header>

    <section class="screen active" id="startScreen">
      <div class="hero">
        <div>
          <h1>準備好接受<br>5 題挑戰了嗎？</h1>
          <p>
            每題有 20 秒作答時間。答對加 20 分，答錯會看到解析。
            完成後會依照成績得到星星評價。
          </p>
          <button class="btn btn-primary" onclick="startGame()">開始挑戰</button>
        </div>

        <div class="hero-card">
          <div class="mascot">🧠</div>
          <div class="rules">
            <div class="rule">⏱️ 每題限時 20 秒</div>
            <div class="rule">🏆 共 5 題，滿分 100 分</div>
            <div class="rule">⭐ 80 分以上獲得 3 顆星</div>
            <div class="rule">🔁 結束後可以重新挑戰</div>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="quizScreen">
      <div class="quiz-wrap">
        <div class="hud">
          <div class="progress-box"><div class="progress" id="progress"></div></div>
          <div class="timer" id="timer">20</div>
          <div class="score-pill">第 <span id="qNumber">1</span> / 5 題</div>
        </div>

        <div class="question-card">
          <div class="q-meta" id="category">健康觀念</div>
          <div class="question" id="questionText"></div>
          <div class="choices" id="choices"></div>
          <div class="feedback" id="feedback"></div>

          <div class="next-row">
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none;">下一題</button>
          </div>
        </div>
      </div>
    </section>

    <section class="screen" id="resultScreen">
      <div class="result">
        <div class="result-emoji" id="resultEmoji">🎉</div>
        <h2 id="resultTitle">完成挑戰！</h2>
        <div class="stars" id="stars">⭐⭐⭐</div>
        <div class="final-score">你的分數：<span id="finalScore">0</span> / 100</div>
        <p id="resultMsg"></p>

        <div class="review" id="review"></div>

        <div class="actions">
          <button class="btn btn-primary" onclick="startGame()">再玩一次</button>
          <button class="btn btn-light" onclick="backToStart()">回首頁</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    /*
      【修改題目區】
      你只要修改 QUESTIONS 裡面的內容，就可以替換成自己的 5 題測驗。
      answer 是正確答案的選項位置：0代表第1個、1代表第2個、2代表第3個、3代表第4個。
    */
    const QUESTIONS = [
      {
        category: "人際與溝通",
        question: "在一段健康的關係中，哪一項最重要？",
        options: ["互相尊重與清楚溝通", "要求對方完全聽自己的", "不讓對方有私人空間", "用冷戰讓對方讓步"],
        answer: 0,
        explanation: "健康關係重視尊重、信任、界線與溝通，而不是控制或威脅。"
      },
      {
        category: "情緒調適",
        question: "當自己感到壓力很大時，哪一種做法比較合適？",
        options: ["完全不理會壓力", "找可信任的人談談並適度休息", "把壓力全部怪罪別人", "熬夜滑手機到很晚"],
        answer: 1,
        explanation: "覺察壓力後，可以透過休息、運動、求助與調整想法來照顧自己。"
      },
      {
        category: "身體自主",
        question: "如果別人的要求讓你覺得不舒服，你可以怎麼做？",
        options: ["勉強自己接受", "保持沉默才不尷尬", "清楚表達拒絕並尋求協助", "假裝沒發生"],
        answer: 2,
        explanation: "每個人都有身體自主權。感到不舒服時，可以拒絕、離開現場並找可信任的大人協助。"
      },
      {
        category: "健康生活",
        question: "下列哪一項比較符合均衡飲食的概念？",
        options: ["只吃自己喜歡的食物", "每天只喝含糖飲料", "完全不吃澱粉", "攝取多樣化食物並注意份量"],
        answer: 3,
        explanation: "均衡飲食強調食物多樣化、適量攝取，並搭配規律生活。"
      },
      {
        category: "網路安全",
        question: "在網路上遇到陌生人要求提供個資時，應該怎麼做？",
        options: ["不要提供，並提高警覺", "馬上提供真實姓名和地址", "把帳號密碼傳給對方", "只要對方親切就相信他"],
        answer: 0,
        explanation: "網路互動要保護個人資料，不隨意提供姓名、地址、電話、帳號密碼等資訊。"
      }
    ];

    const TIME_LIMIT = 20;

    let currentIndex = 0;
    let score = 0;
    let timer = TIME_LIMIT;
    let timerId = null;
    let answered = false;
    let userAnswers = [];

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const topScore = document.getElementById("topScore");
    const progress = document.getElementById("progress");
    const timerEl = document.getElementById("timer");
    const qNumber = document.getElementById("qNumber");
    const category = document.getElementById("category");
    const questionText = document.getElementById("questionText");
    const choices = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const finalScore = document.getElementById("finalScore");
    const stars = document.getElementById("stars");
    const resultTitle = document.getElementById("resultTitle");
    const resultMsg = document.getElementById("resultMsg");
    const resultEmoji = document.getElementById("resultEmoji");
    const review = document.getElementById("review");
    const confetti = document.getElementById("confetti");

    function showScreen(screen){
      [startScreen, quizScreen, resultScreen].forEach(s => s.classList.remove("active"));
      screen.classList.add("active");
    }

    function startGame(){
      currentIndex = 0;
      score = 0;
      userAnswers = [];
      topScore.textContent = score;
      showScreen(quizScreen);
      loadQuestion();
    }

    function backToStart(){
      clearInterval(timerId);
      topScore.textContent = "0";
      showScreen(startScreen);
    }

    function loadQuestion(){
      clearInterval(timerId);
      answered = false;
      timer = TIME_LIMIT;
      timerEl.textContent = timer;
      timerEl.style.borderColor = "var(--yellow)";
      nextBtn.style.display = "none";
      feedback.classList.remove("show");
      feedback.textContent = "";
      choices.innerHTML = "";

      const q = QUESTIONS[currentIndex];
      qNumber.textContent = currentIndex + 1;
      progress.style.width = `${(currentIndex / QUESTIONS.length) * 100}%`;
      category.textContent = q.category;
      questionText.textContent = q.question;

      const letters = ["A", "B", "C", "D"];
      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerHTML = `<span class="letter">${letters[index]}</span><span>${option}</span>`;
        btn.onclick = () => chooseAnswer(index);
        choices.appendChild(btn);
      });

      timerId = setInterval(() => {
        timer--;
        timerEl.textContent = timer;

        if(timer <= 5){
          timerEl.style.borderColor = "var(--bad)";
        }

        if(timer <= 0){
          clearInterval(timerId);
          chooseAnswer(null);
        }
      }, 1000);
    }

    function chooseAnswer(selectedIndex){
      if(answered) return;
      answered = true;
      clearInterval(timerId);

      const q = QUESTIONS[currentIndex];
      const isCorrect = selectedIndex === q.answer;
      const buttons = [...document.querySelectorAll(".choice")];

      buttons.forEach((btn, index) => {
        btn.disabled = true;
        if(index === q.answer) btn.classList.add("correct");
        if(index === selectedIndex && !isCorrect) btn.classList.add("wrong");
      });

      if(isCorrect){
        score += 20;
        topScore.textContent = score;
        feedback.innerHTML = `✅ 答對了！<br>${q.explanation}`;
      }else if(selectedIndex === null){
        feedback.innerHTML = `⏰ 時間到！正確答案是「${q.options[q.answer]}」。<br>${q.explanation}`;
      }else{
        feedback.innerHTML = `❌ 答錯了！正確答案是「${q.options[q.answer]}」。<br>${q.explanation}`;
      }

      userAnswers.push({
        question: q.question,
        selected: selectedIndex,
        correct: q.answer,
        isCorrect
      });

      feedback.classList.add("show");
      nextBtn.textContent = currentIndex === QUESTIONS.length - 1 ? "查看結果" : "下一題";
      nextBtn.style.display = "inline-block";
    }

    function nextQuestion(){
      currentIndex++;
      if(currentIndex < QUESTIONS.length){
        loadQuestion();
      }else{
        showResult();
      }
    }

    function showResult(){
      clearInterval(timerId);
      progress.style.width = "100%";
      showScreen(resultScreen);
      finalScore.textContent = score;

      let starText = "⭐☆☆";
      let msg = "再練習一下，你一定會更熟悉！";
      let title = "挑戰完成！";
      let emoji = "💪";

      if(score >= 80){
        starText = "⭐⭐⭐";
        msg = "太棒了！你已經掌握大部分重要觀念。";
        title = "健康小達人誕生！";
        emoji = "🎉";
        launchConfetti();
      }else if(score >= 60){
        starText = "⭐⭐☆";
        msg = "表現不錯！再複習幾個觀念就更完整。";
        title = "表現很不錯！";
        emoji = "👏";
      }

      stars.textContent = starText;
      resultTitle.textContent = title;
      resultMsg.textContent = msg;
      resultEmoji.textContent = emoji;

      review.innerHTML = "";
      userAnswers.forEach((item, idx) => {
        const q = QUESTIONS[idx];
        const div = document.createElement("div");
        div.className = `review-item ${item.isCorrect ? "good" : "bad"}`;
        const yourAnswer = item.selected === null ? "未作答／時間到" : q.options[item.selected];
        div.innerHTML = `
          <strong>第 ${idx + 1} 題：</strong>${item.isCorrect ? "答對" : "答錯"}<br>
          你的答案：${yourAnswer}<br>
          正確答案：${q.options[q.answer]}
        `;
        review.appendChild(div);
      });
    }

    function launchConfetti(){
      confetti.innerHTML = "";
      const colors = ["#2f80ed", "#ffc94a", "#20b26b", "#ef5350", "#9b7bff"];

      for(let i = 0; i < 60; i++){
        const piece = document.createElement("span");
        piece.style.left = Math.random() * 100 + "%";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * .6 + "s";
        piece.style.transform = `rotate(${Math.random() * 180}deg)`;
        confetti.appendChild(piece);
      }

      setTimeout(() => confetti.innerHTML = "", 2600);
    }
  </script>
</body>
</html>
